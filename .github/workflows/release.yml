name: release

on:
  pull_request_target:
    types: [closed]
    branches:
      - main

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
permissions: {}

jobs:
  release:
    if: github.repository_owner == 'nuxt-contrib' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'v')
    concurrency:
      group: release
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🛠 Build and release project
        run: npm publish

      - name: 🏷️ Create tag
        env:
          TAG_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: 🛳️ Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.pull_request.head.ref }}
          RELEASE_NAME: ${{ github.event.pull_request.head.ref }}
          BODY: ${{ github.event.pull_request.body }}
        run: gh release create "$TAG_NAME" --title "$RELEASE_NAME" --notes "$BODY"
